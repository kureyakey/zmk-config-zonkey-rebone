CONFIG_ZMK_KEYBOARD_NAME="zonkey"

# PMW3610設定
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_PMW3610=y
CONFIG_PMW3610_INVERT_X=n
CONFIG_PMW3610_INVERT_Y=y
CONFIG_PMW3610_SMART_ALGORITHM=y
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=3264
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=20

# BLE設定
CONFIG_ZMK_BLE=y
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# バッテリー監視
CONFIG_ZMK_BATTERY_REPORTING=y

# NFC pins有効化
CONFIG_NFCT_PINS_AS_GPIOS=y

# ディスプレイ無効（右手peripheral）
CONFIG_ZMK_DISPLAY=n
CONFIG_LVGL=n
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=n  # ← 追加
CONFIG_ZMK_WIDGET_BATTERY_STATUS=n
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=n
CONFIG_ZMK_WIDGET_LAYER_STATUS=n
CONFIG_ZMK_WIDGET_WPM_STATUS=n
CONFIG_ZMK_WPM=n
