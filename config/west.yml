manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: sekigon-gonnoc
      url-base: https://github.com/sekigon-gonnoc
    - name: gohanda11
      url-base: https://github.com/gohanda11
    - name: badjeff
      url-base: https://github.com/badjeff
    - name: iwk7273
      url-base: https://github.com/iwk7273
    - name: kureyakey
      url-base: https://github.com/kureyakey
      
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml
    - name: zmk-feature-non-lipo-battery-management
      remote: sekigon-gonnoc
      revision: main
    - name: zmk-feature-xy_clipper
      remote: iwk7273
      revision: main
    - name: zmk-ws2812-driver
      remote: gohanda11
      revision: main
      userdata:
        zmk-module: true # 💡 userdataの下にネストさせることでWestのエラーを回避
    - name: zmk-pmw3610-driver
      remote: kureyakey
      revision: main
      userdata:
        zmk-module: true # 💡 こちらも同様に修正
  self:
    path: config
